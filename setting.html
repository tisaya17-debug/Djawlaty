    <main class="dashboard-main">
      <header class="dashboard-header">
        <div>
          <h1 style="font-size: 1.875rem; margin-bottom: 0.25rem;">Settings</h1>
          <p style="color: var(--muted-foreground);">Manage your account and website configurations</p>
        </div>
      </header>

      <div style="display: grid; gap: 2rem; max-width: 800px;">
        
        <div style="background: white; padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Admin Profile</h3>
          <form class="search-form">
            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div class="field-group">
                <label>Full Name</label>
                <input type="text" placeholder="Admin Name" value="Djawlaty Admin">
              </div>
              <div class="field-group">
                <label>Email Address</label>
                <input type="email" placeholder="admin@djawlaty.com">
              </div>
              <div class="field-group">
                <label>New Password</label>
                <input type="password" placeholder="••••••••">
              </div>
              <div class="field-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••">
              </div>
            </div>
            <div style="margin-top: 1.5rem;">
              <button type="submit" class="btn btn-primary">Save Profile Changes</button>
            </div>
          </form>
        </div>

        <div style="background: white; padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Website Configuration</h3>
          <form class="search-form">
            <div class="field-group" style="margin-bottom: 1.5rem;">
              <label>Website Name</label>
              <input type="text" value="Djawlaty - Your Journey Begins Here">
            </div>
            <div class="field-group" style="margin-bottom: 1.5rem;">
              <label>Currency</label>
              <select>
                <option>USD ($)</option>
                <option>DZD (DA)</option>
                <option>EUR (€)</option>
              </select>
            </div>
            <div class="field-group" style="margin-bottom: 1.5rem;">
              <label>Contact Email (For Bookings)</label>
              <input type="email" value="bookings@djawlaty.com">
            </div>
            <button type="submit" class="btn btn-primary">Update Website Settings</button>
          </form>
        </div>

      </div>
    </main>
  </div>
</body>
</html>
